name: Example8
on: [workflow_dispatch]
jobs:
  stage1:
    runs-on: self-hosted       # os has 2 values that is 3*2=6 combinations.
    steps:
      - run: touch sample.txt
      - run: ls -l
      - name: 'Upload sample.txt file'
        uses: actions/upload-artifact@v4
        with:
          name: my-artifact
          path: sample.txt
  stage2:
    runs-on: self-hosted
    steps:
      - name: 'Download sample.txt file'
        uses: actions/upload-artifact@v4
        with:
          name: my-artifact
          path: sample.txt
      - run: ls -l


