name: Example6
on: [workflow_dispatch]
jobs:
  example_matrix:
    runs-on: self-hosted
    strategy:
      matrix:
        version: [10, 12, 14]
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Print matrix values
        run: |
          echo "Version : ${{ matrix.version }}"
          echo "OS      : ${{ matrix.os }}"
